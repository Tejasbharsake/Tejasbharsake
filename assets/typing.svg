<svg xmlns="http://www.w3.org/2000/svg" width="800" height="55" viewBox="0 0 800 55">
  <defs>
    <style>
      .text {
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        font-size: 22px;
        font-weight: 700;
        fill: #58A6FF;
        text-anchor: middle;
      }
      .cursor {
        fill: #FF6B35;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Line visibility animation — each line fades in/out in sequence */
      .line1 { animation: show1 18s linear infinite; }
      .line2 { animation: show2 18s linear infinite; }
      .line3 { animation: show3 18s linear infinite; }
      .line4 { animation: show4 18s linear infinite; }
      .line5 { animation: show5 18s linear infinite; }
      .line6 { animation: show6 18s linear infinite; }

      @keyframes show1 {
        0%,16.6%   { opacity: 1; }
        16.7%,100% { opacity: 0; }
      }
      @keyframes show2 {
        0%,16.6%   { opacity: 0; }
        16.7%,33.3% { opacity: 1; }
        33.4%,100% { opacity: 0; }
      }
      @keyframes show3 {
        0%,33.3%   { opacity: 0; }
        33.4%,50%  { opacity: 1; }
        50.1%,100% { opacity: 0; }
      }
      @keyframes show4 {
        0%,50%     { opacity: 0; }
        50.1%,66.6%{ opacity: 1; }
        66.7%,100% { opacity: 0; }
      }
      @keyframes show5 {
        0%,66.6%   { opacity: 0; }
        66.7%,83.3%{ opacity: 1; }
        83.4%,100% { opacity: 0; }
      }
      @keyframes show6 {
        0%,83.3%   { opacity: 0; }
        83.4%,100% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="800" height="55" fill="transparent"/>

  <text x="400" y="36" class="text line1">🚀 Senior Full Stack .NET + AI Engineer</text>
  <text x="400" y="36" class="text line2">🤖 Building AI-Powered Enterprise Applications</text>
  <text x="400" y="36" class="text line3">☁️ Azure Cloud | Docker | Kubernetes Specialist</text>
  <text x="400" y="36" class="text line4">⛓️ Blockchain &amp; Web3 Developer</text>
  <text x="400" y="36" class="text line5">🌐 Open to Google | Microsoft | Amazon | Sony</text>
  <text x="400" y="36" class="text line6">💡 Turning Complex Problems Into Elegant Solutions</text>
</svg>
